<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>it's קריוקי</title>
  <style>
    body {
      direction: rtl;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      padding: 40px;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      background-color: white;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
    }
    td {
      padding: 12px 20px;
    }
    input[type="text"], input[type="password"] {
      width: 220px;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .send-btn {
      padding: 10px 20px;
      background-color: #ff6666;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    .send-btn:hover {
      background-color: #ff3333;
    }
    h2 {
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>התחבר לחשבון</h2>

  <form action="Untitled-6.html" method="get">
    <table>
      <tr>
        <td>שם משתמש:</td>
        <td><input type="text" name="username" required></td>
      </tr>
      <tr>
        <td>סיסמא:</td>
        <td><input type="password" name="password" required></td>
      </tr>
      <tr>
        <td colspan="2" style="text-align:center;">
          <button type="submit" class="send-btn">התחבר</button>
          <button type="reset" class="send-btn">נקה</button>
        </td>
      </tr>
    </table>
  </form>

</body>
</html>
